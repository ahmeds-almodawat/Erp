name: Enterprise CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enterprise-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Domain QA
        run: npm run qa:domain
      - name: Build
        run: npm run build
